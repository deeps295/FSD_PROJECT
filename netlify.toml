[build]
  command = "cd client && npm run build"
  functions = "netlify/functions"
  publish = "client/build"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/auth/login"
  to = "/.netlify/functions/auth-login"
  status = 200
  force = true

[[redirects]]
  from = "/api/auth/register"
  to = "/.netlify/functions/auth-register"
  status = 200
  force = true

[[redirects]]
  from = "/api/auth/me"
  to = "/.netlify/functions/auth-me"
  status = 200
  force = true

[[redirects]]
  from = "/api/employees"
  to = "/.netlify/functions/employees"
  status = 200
  force = true

[[redirects]]
  from = "/api/employees/:id"
  to = "/.netlify/functions/employees-id"
  status = 200
  force = true

[[redirects]]
  from = "/api/attendance"
  to = "/.netlify/functions/attendance"
  status = 200
  force = true

[[redirects]]
  from = "/api/attendance/punch"
  to = "/.netlify/functions/attendance-punch"
  status = 200
  force = true

[[redirects]]
  from = "/api/leaves"
  to = "/.netlify/functions/leaves"
  status = 200
  force = true

[[redirects]]
  from = "/api/leaves/:id/approve"
  to = "/.netlify/functions/leaves-id-action"
  status = 200
  force = true

[[redirects]]
  from = "/api/leaves/:id/reject"
  to = "/.netlify/functions/leaves-id-action"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
